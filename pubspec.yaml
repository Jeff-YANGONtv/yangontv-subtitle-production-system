name: yangontv_subtitle_mgmt
description: YangonTV Subtitle Production Management System
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.2.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  glassmorphism: ^3.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/
    - assets/lottie/
